name: deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated subset to deploy (default: all four). e.g. api,web-app'
        required: false
        default: 'api,web-app,www,admin-panel'
      environment:
        description: 'Target environment (only honored on workflow_dispatch).'
        required: false
        type: choice
        default: 'staging'
        options: [staging, prod]

# OIDC for Workload Identity Federation. `contents: read` so checkout works on
# protected refs without granting anything else.
permissions:
  contents: read
  id-token: write

# Concurrency keyed by branch — newer pushes cancel older in-flight runs of
# the same branch so two pipelines can't race against the same env's Cloud
# Run services or Tofu state lock.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: kanea-prod-env
  GCP_REGION: europe-west1
  AR_HOST: europe-west1-docker.pkg.dev
  AR_REPO: kanea

jobs:
  # ----------------------------------------------------------------------
  # Compute deploy target + matrix once. Branch decides env:
  #   refs/heads/main → prod
  #   refs/heads/dev  → staging
  # workflow_dispatch uses the `environment` input.
  #
  # `service_suffix` is `""` for prod (existing service names preserved)
  # and `-staging` for staging — matches `local.name_suffix` in
  # infra/opentofu so Cloud Run names line up between Tofu and gcloud.
  # ----------------------------------------------------------------------
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      image_tag: ${{ steps.set.outputs.image_tag }}
      target_env: ${{ steps.set.outputs.target_env }}
      service_suffix: ${{ steps.set.outputs.service_suffix }}
      backend_prefix: ${{ steps.set.outputs.backend_prefix }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            services="${{ github.event.inputs.services }}"
            target_env="${{ github.event.inputs.environment }}"
          else
            services="api,web-app,www,admin-panel"
            case "${{ github.ref_name }}" in
              main) target_env="prod" ;;
              dev)  target_env="staging" ;;
              *)    echo "::error::unexpected ref ${{ github.ref_name }}"; exit 1 ;;
            esac
          fi

          # Backend prefix: prod stays at the historical path so existing
          # state isn't moved; staging gets its own subdir.
          if [[ "$target_env" == "prod" ]]; then
            service_suffix=""
            backend_prefix="terraform/state"
          else
            service_suffix="-${target_env}"
            backend_prefix="terraform/state/${target_env}"
          fi

          matrix_json=$(jq -cn --arg s "$services" '$s | split(",") | map({service: .})')
          echo "matrix={\"include\":$matrix_json}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "target_env=$target_env" >> "$GITHUB_OUTPUT"
          echo "service_suffix=$service_suffix" >> "$GITHUB_OUTPUT"
          echo "backend_prefix=$backend_prefix" >> "$GITHUB_OUTPUT"

          echo "→ deploying to: $target_env (service suffix '$service_suffix', state prefix '$backend_prefix')"

  # ----------------------------------------------------------------------
  # Build + push each service image in parallel. Image tagged by commit
  # SHA so prod and staging deploys of the same commit reuse the same
  # image; the AR repo is shared between envs.
  # ----------------------------------------------------------------------
  build:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry (cred helper)
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Login to Artifact Registry (static token for buildx)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ matrix.service }}:${{ needs.plan.outputs.image_tag }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ matrix.service }}:buildcache,mode=max
          provenance: false

  # ----------------------------------------------------------------------
  # Apply the OpenTofu config for the target env. Backend prefix and
  # tfvars file are env-specific. Runs in parallel with `build` — they
  # don't depend on each other; `deploy` gates on both.
  # ----------------------------------------------------------------------
  deploy-infra:
    name: Tofu apply (${{ needs.plan.outputs.target_env }})
    needs: plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/opentofu
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.0

      - name: Tofu init (backend prefix=${{ needs.plan.outputs.backend_prefix }})
        run: |
          tofu init \
            -input=false \
            -reconfigure \
            -backend-config="prefix=${{ needs.plan.outputs.backend_prefix }}"

      - name: Tofu apply (env=${{ needs.plan.outputs.target_env }})
        run: |
          tofu apply \
            -auto-approve \
            -input=false \
            -no-color \
            -lock-timeout=300s \
            -var-file="envs/${{ needs.plan.outputs.target_env }}.tfvars"

  # ----------------------------------------------------------------------
  # Roll the new revision into Cloud Run. Service name = base name + env
  # suffix (e.g. `api-staging` for staging, `api` for prod) so the right
  # service in the right env gets the new image.
  # ----------------------------------------------------------------------
  deploy:
    needs: [plan, build, deploy-infra]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service }}${{ needs.plan.outputs.service_suffix }} to Cloud Run
        run: |
          gcloud run services update "${{ matrix.service }}${{ needs.plan.outputs.service_suffix }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --region="${{ env.GCP_REGION }}" \
            --image="${{ env.AR_HOST }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ matrix.service }}:${{ needs.plan.outputs.image_tag }}" \
            --quiet

      - name: Show resulting revision
        run: |
          gcloud run services describe "${{ matrix.service }}${{ needs.plan.outputs.service_suffix }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.latestReadyRevisionName,status.url)'

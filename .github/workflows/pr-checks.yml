name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  code-quality-and-security:
    name: Pre-commit & Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      # --- ADDED STEPS: Install dependencies so Prettier can find its plugins ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install
      # ------------------------------------------------------------------------

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  api-tests:
    name: API tests (pytest)
    runs-on: ubuntu-latest
    needs: code-quality-and-security
    defaults:
      run:
        working-directory: apps/api

    # Postgres sidecar for the integration-flavoured tests that hit the
    # real SQL layer (the repo, the migrations). The unit tests still
    # default to in-memory SQLite via tests/conftest; the integration
    # fixture in tests/integration/conftest.py points its own engine at
    # this service. The fixed credentials match the
    # ``KANEA_TEST_DATABASE_URL`` env var below.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanea
          POSTGRES_PASSWORD: kanea # pragma: allowlist secret
          POSTGRES_DB: kanea_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanea"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Repo / integration tests opt in to the real Postgres engine
      # via this URL. tests/conftest leaves the *unit* default URL
      # alone (sqlite:// in-memory), so test files have to read
      # KANEA_TEST_DATABASE_URL explicitly to engage Postgres.
      KANEA_TEST_DATABASE_URL: postgresql+asyncpg://kanea:kanea@localhost:5432/kanea_test # pragma: allowlist secret

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      # We install from the committed `requirements.txt` (which the api
      # Dockerfile also uses) and a small `requirements-dev.txt` for the
      # test runner. Using pip + a pinned txt avoids the Poetry-version
      # mismatch that bit us before — the lockfile is in poetry-2.x
      # format and 1.x silently mishandles it.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --color=yes

name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  code-quality-and-security:
    name: Pre-commit & Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      # --- ADDED STEPS: Install dependencies so Prettier can find its plugins ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install
      # ------------------------------------------------------------------------

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  api-tests:
    name: API tests (pytest)
    runs-on: ubuntu-latest
    needs: code-quality-and-security
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      # We install from the committed `requirements.txt` (which the api
      # Dockerfile also uses) and a small `requirements-dev.txt` for the
      # test runner. Using pip + a pinned txt avoids the Poetry-version
      # mismatch that bit us before — the lockfile is in poetry-2.x
      # format and 1.x silently mishandles it.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --color=yes
